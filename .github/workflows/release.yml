name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: zip -r factor75-satfat-filter.zip manifest.json content.js content.css

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: factor75-satfat-filter.zip
          generate_release_notes: true
